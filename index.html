<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuxuryLine - Ecommerce Portal for Luxury Fragrances</title>
    <meta name="description" content="Shop luxury perfumes and designer fragrances at LuxuryLine. Discover premium scents, niche brands, and exclusive fragrances with fast delivery. Your destination for luxury perfumes online." />
    <meta name="keywords" content="luxury perfume, designer fragrances, niche perfumes, buy perfume online, fragrance store, premium scents, perfume shop, eau de parfum, cologne, fragrance notes" />
    <meta name="author" content="LuxuryLine" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.luxury-line.com/" />
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com;
      connect-src 'self' http://localhost:3001 https://api.razorpay.com https://checkout.razorpay.com https://fonts.googleapis.com https://fonts.gstatic.com;
      frame-src 'self' https://api.razorpay.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https: blob:;
    ">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://luxuryline.vercel.app/" />
    <meta property="og:title" content="LuxuryLine - Ecommerce Portal for Luxury Fragrances" />
    <meta property="og:description" content="Shop luxury perfumes and designer fragrances. Discover premium scents with fast delivery." />
    <meta property="og:image" content="https://luxuryline.vercel.app/og-image.jpg" />
    <meta property="og:site_name" content="LuxuryLine" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://luxuryline.vercel.app/" />
    <meta name="twitter:title" content="LuxuryLine - Ecommerce Portal for Luxury Fragrances" />
    <meta name="twitter:description" content="Shop luxury perfumes and designer fragrances. Discover premium scents with fast delivery." />
    <meta name="twitter:image" content="https://luxuryline.vercel.app/og-image.jpg" />

    <!-- Apple Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LuxuryLine" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Favicon & Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="application-name" content="LuxuryLine" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Performance -->
    <link rel="preload" as="image" href="/logo.png" />
    <link rel="dns-prefetch" href="https://api.razorpay.com" />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    
    <!-- Schema.org markup for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "LuxuryLine",
      "description": "Ecommerce Portal for Luxury Fragrances",
      "image": "https://www.luxury-line.com/logo.png",
      "url": "https://www.luxury-line.com",
      "email": "contact@luxury-line.com",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Credit Card, Debit Card, Online Payment, Cash on Delivery",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Luxury Perfumes and Fragrances",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Product",
              "name": "Designer Perfumes"
            }
          }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
